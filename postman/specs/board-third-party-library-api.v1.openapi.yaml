openapi: 3.0.3
info:
  title: Board Third Party Library API
  version: 1.0.0-draft
  description: >
    Contract-first API definition for the Board Third Party Library.
    This initial slice defines service metadata, health endpoints, and the first
    Wave 1 identity/platform-role endpoints.
servers:
  - url: http://localhost:5085
    description: Local backend (development)
tags:
  - name: Health
    description: Service metadata and health endpoints.
  - name: Identity
    description: User account registration and identity-related endpoints.
  - name: PlatformRoles
    description: Platform-level roles available to users (player, developer, admin, moderator).
paths:
  /:
    get:
      tags: [Health]
      summary: Get API metadata
      description: Returns basic service metadata and advertised health endpoints.
      operationId: getApiMetadata
      responses:
        '200':
          description: API metadata returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiMetadataResponse'
              examples:
                default:
                  summary: Local development response
                  value:
                    service: board-third-party-lib-backend
                    endpoints:
                      - /health/live
                      - /health/ready
  /health/live:
    get:
      tags: [Health]
      summary: Liveness health check
      description: >
        Indicates whether the API process is running. Does not check downstream dependencies.
      operationId: getLivenessHealth
      responses:
        '200':
          description: API process is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                healthy:
                  summary: Typical healthy liveness response
                  value:
                    status: Healthy
                    checks: []
                    durationMs: 0.2149
  /health/ready:
    get:
      tags: [Health]
      summary: Readiness health check
      description: >
        Indicates whether the API is ready to serve requests, including downstream dependency checks
        (currently PostgreSQL connectivity).
      operationId: getReadinessHealth
      parameters:
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
      responses:
        '200':
          description: API is ready and dependencies are healthy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                healthy:
                  summary: PostgreSQL dependency is healthy
                  value:
                    status: Healthy
                    checks:
                      - name: postgres
                        status: Healthy
                        description: PostgreSQL connection succeeded.
                        data:
                          database: board_tpl
                          user: board_tpl_user
                    durationMs: 6.1373
        '503':
          description: API is running but not ready due to dependency failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                postgres-unhealthy:
                  summary: PostgreSQL dependency failure
                  value:
                    status: Unhealthy
                    checks:
                      - name: postgres
                        status: Unhealthy
                        description: PostgreSQL connection failed.
                    durationMs: 12.551
  /identity/roles:
    get:
      tags: [PlatformRoles]
      summary: List platform roles
      description: >
        Returns the platform-level roles that can be assigned to users. These are global
        roles (for example player/developer/admin) and are distinct from organization-scoped roles.
      operationId: listPlatformRoles
      responses:
        '200':
          description: Platform roles returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformRoleListResponse'
              examples:
                default:
                  summary: Default system platform roles
                  value:
                    roles:
                      - code: player
                        displayName: Player
                        scope: platform
                      - code: developer
                        displayName: Developer
                        scope: platform
                      - code: admin
                        displayName: Admin
                        scope: platform
                      - code: moderator
                        displayName: Moderator
                        scope: platform
  /identity/register/email:
    post:
      tags: [Identity]
      summary: Register account with email and password
      description: >
        Creates a new user account using email and password authentication and assigns one or more
        requested platform roles (for example player/developer). Additional OAuth identities may be linked later.
      operationId: registerUserWithEmail
      parameters:
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterEmailRequest'
            examples:
              player-and-developer:
                summary: Register a combined player/developer account
                value:
                  email: alex@example.com
                  password: StrongPassword!123
                  displayName: Alex Rivers
                  requestedRoleCodes:
                    - player
                    - developer
      responses:
        '201':
          description: Account registered successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterEmailResponse'
              examples:
                created:
                  summary: Newly registered user account
                  value:
                    user:
                      id: 9d65dc87-c5d2-4a1a-aac0-9414968e8b47
                      displayName: Alex Rivers
                      status: active
                      roles:
                        - player
                        - developer
                    primaryEmail:
                      email: alex@example.com
                      verified: false
        '409':
          description: Email address is already registered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                duplicate-email:
                  summary: Duplicate email address
                  value:
                    type: https://boardtpl.dev/problems/duplicate-email
                    title: Duplicate email address
                    status: 409
                    detail: An account with this email address already exists.
                    code: duplicate_email
        '422':
          description: Validation failed for the request payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationProblemDetails'
              examples:
                invalid-request:
                  summary: Password too short and missing role
                  value:
                    type: https://boardtpl.dev/problems/validation-error
                    title: Request validation failed
                    status: 422
                    code: validation_error
                    errors:
                      password:
                        - Password must meet minimum complexity requirements.
                      requestedRoleCodes:
                        - At least one platform role must be requested.
  /identity/me/email-addresses:
    get:
      tags: [Identity]
      summary: List my email addresses
      description: >
        Returns the current user's email addresses, including primary/verification status.
        Requires an authenticated end-user bearer token.
      operationId: listMyEmailAddresses
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User email addresses returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEmailAddressListResponse'
              examples:
                default:
                  summary: User with primary and secondary email addresses
                  value:
                    emailAddresses:
                      - id: e7fb8793-8443-487b-9bfc-e5ef38145c4a
                        email: alex@example.com
                        verified: true
                        isPrimary: true
                        status: active
                      - id: 489a1540-39f5-499f-a4fd-1874a0136d31
                        email: alex.rivers@example.com
                        verified: false
                        isPrimary: false
                        status: pending_verification
    post:
      tags: [Identity]
      summary: Add email address
      description: >
        Adds a new email address to the current user's account in pending verification status.
        The email can become primary after verification.
      operationId: addMyEmailAddress
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddUserEmailAddressRequest'
            examples:
              add-secondary:
                summary: Add a secondary email address
                value:
                  email: alex.rivers@example.com
      responses:
        '201':
          description: Email address added and verification is pending.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddUserEmailAddressResponse'
              examples:
                created:
                  summary: Pending verification email address created
                  value:
                    emailAddress:
                      id: 489a1540-39f5-499f-a4fd-1874a0136d31
                      email: alex.rivers@example.com
                      verified: false
                      isPrimary: false
                      status: pending_verification
        '409':
          description: Email address is already in use by another account.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                duplicate-email:
                  summary: Duplicate email address
                  value:
                    type: https://boardtpl.dev/problems/duplicate-email
                    title: Duplicate email address
                    status: 409
                    detail: This email address is already associated with another account.
                    code: duplicate_email
        '422':
          description: Validation failed for the request payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationProblemDetails'
              examples:
                invalid-email:
                  summary: Invalid email address format
                  value:
                    type: https://boardtpl.dev/problems/validation-error
                    title: Request validation failed
                    status: 422
                    code: validation_error
                    errors:
                      email:
                        - A valid email address is required.
  /identity/me/email-addresses/{emailAddressId}/make-primary:
    post:
      tags: [Identity]
      summary: Make email address primary
      description: >
        Sets the specified email address as the current user's primary email address.
        The target email address must already be verified.
      operationId: makeMyEmailAddressPrimary
      security:
        - BearerAuth: []
      parameters:
        - name: emailAddressId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
      responses:
        '200':
          description: Primary email address updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEmailAddressListResponse'
              examples:
                primary-changed:
                  summary: Primary email switched to another verified address
                  value:
                    emailAddresses:
                      - id: e7fb8793-8443-487b-9bfc-e5ef38145c4a
                        email: alex@example.com
                        verified: true
                        isPrimary: false
                        status: active
                      - id: 489a1540-39f5-499f-a4fd-1874a0136d31
                        email: alex.rivers@example.com
                        verified: true
                        isPrimary: true
                        status: active
        '404':
          description: Email address not found for the current user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                not-found:
                  summary: Email address ID does not exist for the user
                  value:
                    type: https://boardtpl.dev/problems/email-address-not-found
                    title: Email address not found
                    status: 404
                    detail: The requested email address was not found for the current user.
                    code: email_address_not_found
        '409':
          description: Email address cannot be made primary because it is not yet verified.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                email-not-verified:
                  summary: Target email address must be verified before becoming primary
                  value:
                    type: https://boardtpl.dev/problems/email-not-verified
                    title: Email address is not verified
                    status: 409
                    detail: Verify this email address before setting it as primary.
                    code: email_not_verified
  /identity/me/email-addresses/{emailAddressId}/send-verification:
    post:
      tags: [Identity]
      summary: Send email verification challenge
      description: >
        Sends or re-sends an email verification challenge for the specified email address.
        The target email address must belong to the current user and must not already be verified.
      operationId: sendMyEmailAddressVerificationChallenge
      security:
        - BearerAuth: []
      parameters:
        - name: emailAddressId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
      responses:
        '202':
          description: Verification challenge accepted for delivery.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendUserEmailVerificationChallengeResponse'
              examples:
                accepted:
                  summary: Verification email queued/sent
                  value:
                    verificationChallenge:
                      emailAddressId: 489a1540-39f5-499f-a4fd-1874a0136d31
                      deliveryChannel: email
                      destinationHint: a***.r******@example.com
                      status: sent
                      expiresAt: '2026-02-23T12:15:00Z'
                      resendAvailableAt: '2026-02-23T11:56:00Z'
        '404':
          description: Email address not found for the current user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                not-found:
                  summary: Email address ID does not exist for the user
                  value:
                    type: https://boardtpl.dev/problems/email-address-not-found
                    title: Email address not found
                    status: 404
                    detail: The requested email address was not found for the current user.
                    code: email_address_not_found
        '409':
          description: Email address is already verified and does not require a verification challenge.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                already-verified:
                  summary: Email address already verified
                  value:
                    type: https://boardtpl.dev/problems/email-already-verified
                    title: Email address is already verified
                    status: 409
                    detail: This email address is already verified.
                    code: email_already_verified
        '401':
          $ref: '#/components/responses/UnauthorizedProblemResponse'
        '403':
          $ref: '#/components/responses/ForbiddenProblemResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsProblemResponse'
  /identity/me/email-addresses/{emailAddressId}/verify:
    post:
      tags: [Identity]
      summary: Verify email address
      description: >
        Confirms ownership of the specified email address using a verification code previously sent
        to that address.
      operationId: verifyMyEmailAddress
      security:
        - BearerAuth: []
      parameters:
        - name: emailAddressId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyUserEmailAddressRequest'
            examples:
              code-entry:
                summary: User submits emailed verification code
                value:
                  code: '482913'
      responses:
        '200':
          description: Email address verified successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyUserEmailAddressResponse'
              examples:
                verified:
                  summary: Email address verified and activated
                  value:
                    emailAddress:
                      id: 489a1540-39f5-499f-a4fd-1874a0136d31
                      email: alex.rivers@example.com
                      verified: true
                      isPrimary: false
                      status: active
        '404':
          description: Email address not found for the current user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                not-found:
                  summary: Email address ID does not exist for the user
                  value:
                    type: https://boardtpl.dev/problems/email-address-not-found
                    title: Email address not found
                    status: 404
                    detail: The requested email address was not found for the current user.
                    code: email_address_not_found
        '409':
          description: Verification code is invalid, expired, or no longer applicable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                invalid-or-expired-code:
                  summary: Verification code invalid or expired
                  value:
                    type: https://boardtpl.dev/problems/verification-code-invalid
                    title: Verification code is invalid or expired
                    status: 409
                    detail: The verification code is invalid, expired, or has already been used.
                    code: verification_code_invalid
        '422':
          description: Validation failed for the request payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationProblemDetails'
              examples:
                invalid-code-format:
                  summary: Verification code is missing or malformed
                  value:
                    type: https://boardtpl.dev/problems/validation-error
                    title: Request validation failed
                    status: 422
                    code: validation_error
                    errors:
                      code:
                        - A verification code is required.
        '401':
          $ref: '#/components/responses/UnauthorizedProblemResponse'
        '403':
          $ref: '#/components/responses/ForbiddenProblemResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsProblemResponse'
components:
  parameters:
    PostmanMockResponseCodeHeader:
      name: x-mock-response-code
      in: header
      required: false
      schema:
        type: string
      description: >
        Postman mock-only header used to force a specific saved example by HTTP status code during
        mock validation runs. Production backends should ignore this header.
    PostmanMockResponseNameHeader:
      name: x-mock-response-name
      in: header
      required: false
      schema:
        type: string
      description: >
        Postman mock-only header used to force a specific saved example by example name during
        mock validation runs. Production backends should ignore this header.
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        End-user access token for authenticated identity operations (for example `/identity/me/*`).
        Public/native UI applications should use an OAuth-style flow with PKCE; do not embed a
        client secret in distributed clients.
  responses:
    UnauthorizedProblemResponse:
      description: Missing, invalid, or expired bearer access token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            unauthorized:
              summary: Bearer token is missing or invalid
              value:
                type: https://boardtpl.dev/problems/unauthorized
                title: Unauthorized
                status: 401
                detail: A valid bearer access token is required.
                code: unauthorized
    ForbiddenProblemResponse:
      description: Authenticated caller is not allowed to perform this action.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            forbidden:
              summary: Caller is authenticated but not permitted
              value:
                type: https://boardtpl.dev/problems/forbidden
                title: Forbidden
                status: 403
                detail: You are not permitted to perform this action.
                code: forbidden
    TooManyRequestsProblemResponse:
      description: Too many requests for this operation. Retry after the cooldown window.
      headers:
        Retry-After:
          description: Number of seconds to wait before retrying.
          schema:
            type: integer
            format: int32
            example: 60
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            rate-limited:
              summary: Email verification action rate limited
              value:
                type: https://boardtpl.dev/problems/rate-limit-exceeded
                title: Too Many Requests
                status: 429
                detail: Too many verification attempts were made. Retry after the cooldown period.
                code: rate_limit_exceeded
  schemas:
    ApiMetadataResponse:
      type: object
      required:
        - service
        - endpoints
      properties:
        service:
          type: string
          example: board-third-party-lib-backend
        endpoints:
          type: array
          items:
            type: string
          example:
            - /health/live
            - /health/ready
    HealthResponse:
      type: object
      required:
        - status
        - checks
        - durationMs
      properties:
        status:
          type: string
          description: Overall health status of the endpoint response.
          enum:
            - Healthy
            - Degraded
            - Unhealthy
        checks:
          type: array
          items:
            $ref: '#/components/schemas/HealthCheckEntry'
        durationMs:
          type: number
          format: double
          description: Total duration of the health check execution in milliseconds.
    HealthCheckEntry:
      type: object
      required:
        - name
        - status
      properties:
        name:
          type: string
          example: postgres
        status:
          type: string
          enum:
            - Healthy
            - Degraded
            - Unhealthy
        description:
          type: string
          nullable: true
        data:
          type: object
          nullable: true
          additionalProperties: true
    PlatformRoleSummary:
      type: object
      required:
        - code
        - displayName
        - scope
      properties:
        code:
          type: string
          example: developer
        displayName:
          type: string
          example: Developer
        scope:
          type: string
          enum:
            - platform
    PlatformRoleListResponse:
      type: object
      required:
        - roles
      properties:
        roles:
          type: array
          items:
            $ref: '#/components/schemas/PlatformRoleSummary'
    RegisterEmailRequest:
      type: object
      required:
        - email
        - password
        - displayName
        - requestedRoleCodes
      properties:
        email:
          type: string
          format: email
          example: alex@example.com
        password:
          type: string
          format: password
          minLength: 8
          example: StrongPassword!123
        displayName:
          type: string
          minLength: 1
          example: Alex Rivers
        requestedRoleCodes:
          type: array
          minItems: 1
          items:
            type: string
            example: player
          example:
            - player
            - developer
    AddUserEmailAddressRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          example: alex.rivers@example.com
    VerifyUserEmailAddressRequest:
      type: object
      required:
        - code
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 32
          example: '482913'
    RegisteredUserSummary:
      type: object
      required:
        - id
        - displayName
        - status
        - roles
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
        status:
          type: string
          enum:
            - active
            - disabled
        roles:
          type: array
          items:
            type: string
    UserEmailAddressSummary:
      type: object
      required:
        - id
        - email
        - verified
        - isPrimary
        - status
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        verified:
          type: boolean
        isPrimary:
          type: boolean
        status:
          type: string
          enum:
            - pending_verification
            - active
            - retired
    RegisterEmailResponse:
      type: object
      required:
        - user
        - primaryEmail
      properties:
        user:
          $ref: '#/components/schemas/RegisteredUserSummary'
        primaryEmail:
          $ref: '#/components/schemas/UserEmailAddressSummary'
    AddUserEmailAddressResponse:
      type: object
      required:
        - emailAddress
      properties:
        emailAddress:
          $ref: '#/components/schemas/UserEmailAddressSummary'
    UserEmailVerificationChallengeSummary:
      type: object
      required:
        - emailAddressId
        - deliveryChannel
        - destinationHint
        - status
        - expiresAt
        - resendAvailableAt
      properties:
        emailAddressId:
          type: string
          format: uuid
        deliveryChannel:
          type: string
          enum:
            - email
        destinationHint:
          type: string
          description: Masked delivery destination shown to the user.
          example: a***@example.com
        status:
          type: string
          enum:
            - sent
            - queued
        expiresAt:
          type: string
          format: date-time
        resendAvailableAt:
          type: string
          format: date-time
    SendUserEmailVerificationChallengeResponse:
      type: object
      required:
        - verificationChallenge
      properties:
        verificationChallenge:
          $ref: '#/components/schemas/UserEmailVerificationChallengeSummary'
    VerifyUserEmailAddressResponse:
      type: object
      required:
        - emailAddress
      properties:
        emailAddress:
          $ref: '#/components/schemas/UserEmailAddressSummary'
    UserEmailAddressListResponse:
      type: object
      required:
        - emailAddresses
      properties:
        emailAddresses:
          type: array
          items:
            $ref: '#/components/schemas/UserEmailAddressSummary'
    ProblemDetails:
      type: object
      required:
        - title
        - status
      properties:
        type:
          type: string
          format: uri
          nullable: true
        title:
          type: string
        status:
          type: integer
          format: int32
        detail:
          type: string
          nullable: true
        code:
          type: string
          nullable: true
    ValidationProblemDetails:
      allOf:
        - $ref: '#/components/schemas/ProblemDetails'
        - type: object
          required:
            - errors
          properties:
            errors:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase access token for the authenticated user session.
  parameters:
    PageNumber:
      name: pageNumber
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
    PageSize:
      name: pageSize
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
    StudioIdentifier:
      name: studioIdentifier
      in: path
      required: true
      description: Studio slug or stable studio ID.
      schema:
        type: string
    TitleIdentifier:
      name: titleIdentifier
      in: path
      required: true
      description: Title slug or stable title ID within the resolved studio.
      schema:
        type: string
    StudioId:
      name: studioId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    LinkId:
      name: linkId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DeveloperSubject:
      name: developerSubject
      in: path
      required: true
      schema:
        type: string
    TitleId:
      name: titleId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RevisionNumber:
      name: revisionNumber
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    MediaRole:
      name: mediaRole
      in: path
      required: true
      schema:
        type: string
        enum: [card, hero, logo]
    ReleaseId:
      name: releaseId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ReportId:
      name: reportId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    NotificationId:
      name: notificationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    ApiMetadata:
      type: object
      required: [service, stack, environment]
      properties:
        service:
          type: string
        stack:
          type: string
        environment:
          type: string
    LivenessResponse:
      type: object
      required: [status, environment]
      properties:
        status:
          type: string
        environment:
          type: string
    ReadinessResponse:
      type: object
      required:
        [status, environment, stackStatus, supabaseUrlConfigured, mediaBucket]
      properties:
        status:
          type: string
        environment:
          type: string
        stackStatus:
          type: string
        supabaseUrlConfigured:
          type: boolean
        mediaBucket:
          type: string
    Problem:
      type: object
      required: [title, status]
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        code:
          type: string
    ValidationProblem:
      allOf:
        - $ref: "#/components/schemas/Problem"
        - type: object
          properties:
            errors:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
    CurrentUserResponse:
      type: object
      required: [subject, displayName, emailVerified, roles]
      properties:
        subject:
          type: string
        displayName:
          type: string
        email:
          type: [string, "null"]
        emailVerified:
          type: boolean
        identityProvider:
          type: [string, "null"]
        roles:
          type: array
          items:
            type: string
    UserProfile:
      type: object
      required: [subject, userName, emailVerified, initials, updatedAt]
      properties:
        subject:
          type: string
        displayName:
          type: [string, "null"]
        userName:
          type: [string, "null"]
        firstName:
          type: [string, "null"]
        lastName:
          type: [string, "null"]
        email:
          type: [string, "null"]
        emailVerified:
          type: boolean
        avatarUrl:
          type: [string, "null"]
        avatarDataUrl:
          type: [string, "null"]
        initials:
          type: string
        updatedAt:
          type: string
          format: date-time
    UserProfileResponse:
      type: object
      required: [profile]
      properties:
        profile:
          $ref: "#/components/schemas/UserProfile"
    UserNotification:
      type: object
      required: [id, category, title, body, isRead, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        category:
          type: string
        title:
          type: string
        body:
          type: string
        actionUrl:
          type: [string, "null"]
        isRead:
          type: boolean
        readAt:
          type: [string, "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    UserNotificationListResponse:
      type: object
      required: [notifications]
      properties:
        notifications:
          type: array
          items:
            $ref: "#/components/schemas/UserNotification"
    UserNotificationResponse:

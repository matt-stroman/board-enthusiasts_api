openapi: 3.1.0
info:
  title: Board Enthusiasts API
  version: 1.0.0
  description: >
    Maintained API surface served by Cloudflare Workers with Supabase Auth,
    Postgres, and Storage.
servers:
  - url: http://127.0.0.1:8787
    description: Local Workers runtime
  - url: https://api.staging.boardenthusiasts.com
    description: Staging Workers runtime
tags:
  - name: Health
    description: API metadata and dependency health probes.
  - name: Catalog
    description: Public catalog and studio browsing routes.
  - name: Identity
    description: Current-user bootstrap and profile routes.
  - name: Player
    description: Player library, wishlist, and title report routes.
  - name: Developer
    description: Developer enrollment and managed studio routes.
  - name: Moderation
    description: Moderator search and review routes.
paths:
  /:
    get:
      tags: [Health]
      security: []
      summary: Get API metadata
      operationId: getApiMetadata
      responses:
        "200":
          description: API metadata returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMetadata"
  /health/live:
    get:
      tags: [Health]
      security: []
      summary: Liveness health probe
      operationId: getLiveness
      responses:
        "200":
          description: Worker process is live.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LivenessResponse"
  /health/ready:
    get:
      tags: [Health]
      security: []
      summary: Readiness health probe
      operationId: getReadiness
      responses:
        "200":
          description: Worker dependencies are ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
        "503":
          description: Supabase dependencies are unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /genres:
    get:
      tags: [Catalog]
      security: []
      summary: List supported catalog genres
      operationId: listGenres
      responses:
        "200":
          description: Catalog genres returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenreListResponse"
  /age-rating-authorities:
    get:
      tags: [Catalog]
      security: []
      summary: List supported age rating authorities
      operationId: listAgeRatingAuthorities
      responses:
        "200":
          description: Age rating authorities returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgeRatingAuthorityListResponse"
  /catalog:
    get:
      tags: [Catalog]
      security: []
      summary: List public catalog titles
      operationId: listCatalogTitles
      parameters:
        - $ref: "#/components/parameters/PageNumber"
        - $ref: "#/components/parameters/PageSize"
        - name: studioSlug
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: contentKind
          in: query
          required: false
          schema:
            type: string
            enum: [game, app]
        - name: genre
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: minPlayers
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
        - name: maxPlayers
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [title-asc, title-desc, studio-asc, studio-desc, genre-asc, players-asc, players-desc, age-asc, age-desc]
      responses:
        "200":
          description: Public catalog titles returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogTitleListResponse"
  /catalog/{studioIdentifier}/{titleIdentifier}:
    get:
      tags: [Catalog]
      security: []
      summary: Get public catalog title detail
      operationId: getCatalogTitle
      parameters:
        - $ref: "#/components/parameters/StudioIdentifier"
        - $ref: "#/components/parameters/TitleIdentifier"
      responses:
        "200":
          description: Public catalog title detail returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogTitleResponse"
        "404":
          description: Catalog title was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /studios:
    get:
      tags: [Catalog]
      security: []
      summary: List public studios
      operationId: listStudios
      responses:
        "200":
          description: Public studios returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudioListResponse"
    post:
      tags: [Developer]
      summary: Create a studio for the current developer
      operationId: createStudio
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudioMutationRequest"
      responses:
        "201":
          description: Studio created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudioResponse"
        "400":
          description: Studio create request was invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationProblem"
        "401":
          description: Bearer token was missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: Current user does not have developer access.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "409":
          description: Studio slug is already in use.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /studios/{studioIdentifier}:
    get:
      tags: [Catalog]
      security: []
      summary: Get public studio detail
      operationId: getStudio
      parameters:
        - $ref: "#/components/parameters/StudioIdentifier"
      responses:
        "200":
          description: Public studio detail returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudioResponse"
        "404":
          description: Studio was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /identity/user-name-availability:
    get:
      tags: [Identity]
      security: []
      summary: Check whether a public username is available
      operationId: getUserNameAvailability
      parameters:
        - name: userName
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Username availability returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserNameAvailabilityResponse"
        "400":
          description: Username availability request was invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationProblem"
  /identity/me:
    get:
      tags: [Identity]
      summary: Get the current user bootstrap payload
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"
        "401":
          description: Bearer token was missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /identity/me/profile:
    get:
      tags: [Identity]
      summary: Get the current user profile
      operationId: getCurrentUserProfile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user profile returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileResponse"
        "401":
          description: Bearer token was missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
    put:
      tags: [Identity]
      summary: Update the current user profile
      operationId: updateCurrentUserProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserProfileRequest"
      responses:
        "200":
          description: Current user profile updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileResponse"
        "400":
          description: Profile update request was invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationProblem"
        "401":
          description: Bearer token was missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /identity/me/developer-enrollment:
    get:
      tags: [Identity]
      summary: Get developer enrollment state for the current user
      operationId: getDeveloperEnrollment
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Developer enrollment read model returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeveloperEnrollmentResponse"
        "401":
          description: Bearer token was missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
    post:
      tags: [Identity]
      summary: Enroll the current user as a developer
      operationId: enrollCurrentUserAsDeveloper
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Developer enrollment was applied successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeveloperEnrollmentResponse"
        "401":
          description: Bearer token was missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /identity/me/board-profile:
    get:
      tags: [Identity]
      summary: Get the current user's linked Board profile
      operationId: getBoardProfile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Linked Board profile lookup completed successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoardProfileResponse"
        "401":
          description: Bearer token was missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: Current user has no linked Board profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
    put:
      tags: [Identity]
      summary: Create or update the current user's linked Board profile
      operationId: upsertBoardProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertBoardProfileRequest"
      responses:
        "200":
          description: Linked Board profile updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoardProfileResponse"
        "400":
          description: Board profile request was invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationProblem"
        "401":
          description: Bearer token was missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
    delete:
      tags: [Identity]
      summary: Delete the current user's linked Board profile
      operationId: deleteBoardProfile
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Linked Board profile deleted successfully.
        "401":
          description: Bearer token was missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: Current user has no linked Board profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /identity/me/notifications:
    get:
      tags: [Identity]
      summary: List current-user notifications
      operationId: getCurrentUserNotifications
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current-user notifications returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserNotificationListResponse"
        "401":
          description: Bearer token was missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /identity/me/notifications/{notificationId}/read:
    post:
      tags: [Identity]
      summary: Mark a current-user notification as read
      operationId: markCurrentUserNotificationRead
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NotificationId"
      responses:
        "200":
          description: Current-user notification was updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserNotificationResponse"
        "401":
          description: Bearer token was missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: Notification was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /player/library:
    get:
      tags: [Player]
      summary: List titles in the current player's library
      operationId: getPlayerLibrary
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Player library titles returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerTitleListResponse"
        "401":
          description: Bearer token was missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /player/library/titles/{titleId}:
    put:
      tags: [Player]
      summary: Add a title to the current player's library
      operationId: addTitleToPlayerLibrary
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TitleId"
      responses:
        "200":
          description: Player library mutation applied successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerCollectionMutationResponse"
        "401":
          description: Bearer token was missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: Title was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
    delete:
      tags: [Player]
      summary: Remove a title from the current player's library
      operationId: removeTitleFromPlayerLibrary
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TitleId"
      responses:
        "200":
          description: Player library mutation applied successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerCollectionMutationResponse"
        "401":
          description: Bearer token was missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: Title was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /player/wishlist:
    get:
      tags: [Player]
      summary: List titles in the current player's wishlist
      operationId: getPlayerWishlist
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Player wishlist titles returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerTitleListResponse"
        "401":
          description: Bearer token was missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /player/wishlist/titles/{titleId}:
    put:
      tags: [Player]
      summary: Add a title to the current player's wishlist
      operationId: addTitleToPlayerWishlist
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TitleId"
      responses:
        "200":
          description: Player wishlist mutation applied successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerCollectionMutationResponse"
        "401":
          description: Bearer token was missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: Title was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
    delete:
      tags: [Player]
      summary: Remove a title from the current player's wishlist
      operationId: removeTitleFromPlayerWishlist
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TitleId"
      responses:
        "200":
          description: Player wishlist mutation applied successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerCollectionMutationResponse"
        "401":
          description: Bearer token was missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: Title was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /player/reports:
    get:
      tags: [Player]
      summary: List title reports created by the current player
      operationId: listPlayerTitleReports
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Player title reports returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerTitleReportListResponse"
        "401":
          description: Bearer token was missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
    post:
      tags: [Player]
      summary: Create a title report for the current player
      operationId: createPlayerTitleReport
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlayerTitleReportRequest"
      responses:
        "201":
          description: Player title report created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerTitleReportResponse"
        "400":
          description: Player title report request was invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationProblem"
        "401":
          description: Bearer token was missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: Title was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /player/reports/{reportId}:
    get:
      tags: [Player]
      summary: Get a title report owned by the current player
      operationId: getPlayerTitleReport
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ReportId"
      responses:
        "200":
          description: Player title report detail returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TitleReportDetailResponse"
        "401":
          description: Bearer token was missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: Current user does not have access to this title report.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: Title report was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /player/reports/{reportId}/messages:
    post:
      tags: [Player]
      summary: Add a player message to a title report thread
      operationId: addPlayerTitleReportMessage
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ReportId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddTitleReportMessageRequest"
      responses:
        "200":
          description: Player title report thread updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TitleReportDetailResponse"
        "400":
          description: Title report message request was invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationProblem"
        "401":
          description: Bearer token was missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: Current user does not have access to this title report.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: Title report was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /developer/studios:
    get:
      tags: [Developer]
      summary: List studios managed by the current developer
      operationId: listManagedStudios
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Managed studios returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeveloperStudioListResponse"
        "401":
          description: Bearer token was missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: Current user does not have developer access.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /developer/studios/{studioId}:
    put:
      tags: [Developer]
      summary: Update a managed studio
      operationId: updateStudio
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StudioId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudioMutationRequest"
      responses:
        "200":
          description: Studio updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudioResponse"
        "400":
          description: Studio update request was invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationProblem"
        "401":
          description: Bearer token was missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: Current user does not have studio access.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: Studio was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "409":
          description: Studio slug is already in use.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
    delete:
      tags: [Developer]
      summary: Delete a managed studio
      operationId: deleteStudio
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StudioId"
      responses:
        "204":
          description: Studio deleted successfully.
        "401":
          description: Bearer token was missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: Current user does not have studio owner access.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: Studio was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /developer/studios/{studioId}/links:
    get:
      tags: [Developer]
      summary: List links for a managed studio
      operationId: listStudioLinks
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StudioId"
      responses:
        "200":
          description: Studio links returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudioLinkListResponse"
        "401":
          description: Bearer token was missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: Current user does not have studio access.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: Studio was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
    post:
      tags: [Developer]
      summary: Create a link for a managed studio
      operationId: createStudioLink
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StudioId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudioLinkMutationRequest"
      responses:
        "201":
          description: Studio link created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudioLinkResponse"
        "400":
          description: Studio link create request was invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationProblem"
        "401":
          description: Bearer token was missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: Current user does not have studio access.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: Studio was not found.
